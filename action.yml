name: 'ATHelper Probe'
description: 'Run AI agent red-team probes; upload SARIF + emit PR check summary'
author: 'ATHelper'
branding:
  icon: 'shield'
  color: 'red'
inputs:
  api-token:
    required: true
    description: 'ATHELPER_API_TOKEN secret'
  target-config:
    required: true
    description: 'Path to target.json or inline JSON object describing the target'
  probes:
    required: false
    default: 'all'
    description: "Comma-separated probe IDs or 'all' for the full library"
  threshold:
    required: false
    default: 'warn'
    description: 'warn | block-on-critical | block-on-high'
  per-run-cap:
    required: false
    default: '0.50'
    description: 'Per-run USD cost cap'
  cli-version:
    required: false
    default: 'v0.1.1'
    description: 'athelper-probe CLI version tag'
runs:
  using: composite
  steps:
    - name: Install athelper-probe
      shell: bash
      run: |
        set -euo pipefail
        VERSION="${{ inputs.cli-version }}"
        BIN_DIR="$RUNNER_TEMP/athelper-bin"
        mkdir -p "$BIN_DIR"
        curl -fsSL "https://github.com/gy15901580825/at_helper_cli/releases/download/${VERSION}/athelper-probe-linux-x86_64" -o "$BIN_DIR/athelper-probe"
        chmod +x "$BIN_DIR/athelper-probe"
        echo "$BIN_DIR" >> "$GITHUB_PATH"
        "$BIN_DIR/athelper-probe" --help > /dev/null
    - name: Run probes
      shell: bash
      env:
        ATHELPER_API_TOKEN: ${{ inputs.api-token }}
      run: |
        set -euo pipefail
        athelper-probe run \
          --target "${{ inputs.target-config }}" \
          --probes "${{ inputs.probes }}" \
          --format sarif \
          --out report.sarif \
          --token "${{ inputs.api-token }}" \
          --per-run-cap "${{ inputs.per-run-cap }}"
    - name: Upload SARIF to code-scanning
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: report.sarif
    - name: Post PR check summary + annotations
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const path = require('path');
          const summarize = require(path.join('${{ github.action_path }}', 'scripts', 'post-pr-summary.js'));
          await summarize({ github, context, core });
    - name: Threshold gate
      shell: bash
      run: bash "${{ github.action_path }}/threshold-gate.sh" "${{ inputs.threshold }}" report.sarif
