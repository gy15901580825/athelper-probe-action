name: 'ATHelper Probe'
description: 'Run AI agent red-team probes; upload SARIF + emit PR check summary'
author: 'ATHelper'
branding:
  icon: 'shield'
  color: 'red'
inputs:
  api-token:
    required: true
    description: 'ATHELPER_API_TOKEN secret'
  target-config:
    required: true
    description: 'Path to target.json or inline JSON object describing the target'
  probe-ids:
    required: false
    default: ''
    description: 'Comma-separated probe IDs (default: server picks all #1 + #2)'
  threshold:
    required: false
    default: 'warn'
    description: 'warn | block-on-critical | block-on-high'
  per-run-cap:
    required: false
    default: '0.50'
    description: 'Per-run USD cost cap'
  cli-version:
    required: false
    default: 'v0.1.0'
    description: 'athelper-probe CLI version tag'
runs:
  using: composite
  steps:
    - name: Install athelper-probe
      shell: bash
      run: |
        VERSION="${{ inputs.cli-version }}"
        curl -sSL "https://github.com/gy15901580825/at_helper_cli/releases/download/${VERSION}/athelper-probe-linux-x86_64" -o /usr/local/bin/athelper-probe
        chmod +x /usr/local/bin/athelper-probe
        athelper-probe --version || true
    - name: Run probes
      shell: bash
      env:
        ATHELPER_API_TOKEN: ${{ inputs.api-token }}
      run: |
        ARGS=(run --target "${{ inputs.target-config }}" --per-run-cap "${{ inputs.per-run-cap }}" --output report.sarif --format sarif --api-token "${{ inputs.api-token }}")
        if [ -n "${{ inputs.probe-ids }}" ]; then
          ARGS+=(--probe-ids "${{ inputs.probe-ids }}")
        fi
        athelper-probe "${ARGS[@]}"
    - name: Upload SARIF to code-scanning
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: report.sarif
    - name: Post PR check summary + annotations
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const path = require('path');
          const summarize = require(path.join('${{ github.action_path }}', 'scripts', 'post-pr-summary.js'));
          await summarize({ github, context, core });
    - name: Threshold gate
      shell: bash
      run: bash "${{ github.action_path }}/threshold-gate.sh" "${{ inputs.threshold }}" report.sarif
